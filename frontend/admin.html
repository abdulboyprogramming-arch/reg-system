<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Registration System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .user-table th, .user-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .user-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        .status-active {
            color: green;
            font-weight: bold;
        }
        .status-inactive {
            color: red;
        }
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            margin: 0 2px;
        }
        .search-box {
            margin-bottom: 20px;
            padding: 10px;
            width: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
            
            <div class="section-card">
                <div class="section-title">👥 User Management</div>
                <input type="text" id="searchInput" class="search-box" placeholder="Search users...">
                <div style="overflow-x: auto;">
                    <table class="user-table" id="userTable">
                        <thead>
                            <tr><th>ID</th><th>Username</th><th>Email</th><th>Full Name</th><th>Status</th><th>Admin</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="section-card">
                <div class="section-title">📊 System Statistics</div>
                <div id="adminStats"></div>
            </div>
        </div>
    </div>
    
    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit User</h3>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="editPhone">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editIsActive"> Active
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="editIsAdmin"> Administrator
                    </label>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadAdminData() {
            try {
                // Check if admin
                const sessionRes = await fetch('/api/session');
                const session = await sessionRes.json();
                if (!session.authenticated || !session.user.is_admin) {
                    window.location.href = '/dashboard';
                    return;
                }
                
                // Load users
                const usersRes = await fetch('/api/users');
                const usersData = await usersRes.json();
                allUsers = usersData.users;
                renderUsers(allUsers);
                
                // Load stats
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('adminStats').innerHTML = `
                    <p><strong>Total Users:</strong> ${stats.stats.total_users}</p>
                    <p><strong>Active Users:</strong> ${stats.stats.active_users}</p>
                    <p><strong>Admin Users:</strong> ${stats.stats.admin_users}</p>
                    <p><strong>Registration Rate:</strong> ${stats.stats.registration_rate}</p>
                `;
                
            } catch (error) {
                console.error('Failed to load admin data:', error);
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.username)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${escapeHtml(user.full_name || '-')}</td>
                    <td class="${user.is_active ? 'status-active' : 'status-inactive'}">${user.is_active ? 'Active' : 'Inactive'}</td>
                    <td>${user.is_admin ? 'Yes' : 'No'}</td>
                    <td>
                        <button class="btn btn-small btn-primary" onclick="editUser(${user.id})">Edit</button>
                        <button class="btn btn-small btn-secondary" onclick="toggleUserStatus(${user.id}, ${!user.is_active})">${user.is_active ? 'Deactivate' : 'Activate'}</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function editUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (user) {
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editFullName').value = user.full_name || '';
                document.getElementById('editPhone').value = user.phone || '';
                document.getElementById('editIsActive').checked = user.is_active;
                document.getElementById('editIsAdmin').checked = user.is_admin;
                document.getElementById('editModal').style.display = 'flex';
            }
        }
        
        async function saveUserEdit(event) {
            event.preventDefault();
            const userId = document.getElementById('editUserId').value;
            const updates = {
                full_name: document.getElementById('editFullName').value,
                phone: document.getElementById('editPhone').value,
                is_active: document.getElementById('editIsActive').checked,
                is_admin: document.getElementById('editIsAdmin').checked
            };
            
            try {
                const response = await fetch('/api/update-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, updates })
                });
                const result = await response.json();
                if (result.success) {
                    alert('User updated successfully');
                    closeModal();
                    loadAdminData();
                } else {
                    alert('Update failed: ' + result.error);
                }
            } catch (error) {
                alert('Error updating user');
            }
        }
        
        async function toggleUserStatus(userId, newStatus) {
            const updates = { is_active: newStatus };
            try {
                const response = await fetch('/api/update-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, updates })
                });
                const result = await response.json();
                if (result.success) {
                    loadAdminData();
                } else {
                    alert('Failed to update status');
                }
            } catch (error) {
                alert('Error updating status');
            }
        }
        
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function searchUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.username.toLowerCase().includes(searchTerm) ||
                user.email.toLowerCase().includes(searchTerm) ||
                (user.full_name && user.full_name.toLowerCase().includes(searchTerm))
            );
            renderUsers(filtered);
        }
        
        function logout() {
            window.location.href = '/logout';
        }
        
        document.getElementById('editUserForm').addEventListener('submit', saveUserEdit);
        document.getElementById('searchInput').addEventListener('input', searchUsers);
        document.addEventListener('DOMContentLoaded', loadAdminData);
    </script>
</body>
</html>
